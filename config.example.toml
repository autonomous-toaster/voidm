# voidm configuration file
# Place at ~/.config/voidm/config.toml to enable
# All sections and options are optional and will use sensible defaults

[database]
# SQLite backend (default)
backend = "sqlite"
# Path to SQLite database (default: ~/.local/share/voidm/voidm.db)
sqlite_path = "~/.local/share/voidm/voidm.db"

# Alternatively, use Neo4j
# backend = "neo4j"
# [database.neo4j]
# uri = "bolt://localhost:7687"
# username = "neo4j"
# password = "password"

[embeddings]
# Embedding model for semantic search and deduplication
# Options: "Xenova/all-MiniLM-L6-v2" (default), "BAAI/bge-base-en-v1.5", "BAAI/bge-large-en-v1.5", etc.
enabled = true
model = "Xenova/all-MiniLM-L6-v2"

[search]
# Search configuration
mode = "hybrid"                          # "bm25" | "semantic" | "hybrid"
default_limit = 10                       # Default results per query
min_score = 0.3                          # Min relevance score (0.0-1.0)
neighbor_decay = 0.7                     # Graph neighbor weight decay
neighbor_min_score = 0.2                 # Min score for graph neighbors
default_neighbor_depth = 1               # Max distance in concept graph
default_edge_types = [
    "PART_OF",
    "SUPPORTS",
    "DERIVED_FROM",
    "EXEMPLIFIES",
]

# Reranker configuration (optional, improves search quality)
[search.reranker]
enabled = false                          # Enable cross-encoder reranking
model = "ms-marco-TinyBERT"             # Options: "ms-marco-TinyBERT", "bge-reranker-base"
apply_to_top_k = 10                      # Only rerank top-k results
blend = 0.7                              # BM25 + 0.7×reranker (0-1.0)

[insert]
# Concept insertion settings for auto-linking and deduplication
auto_link_threshold = 0.7                # Min similarity to auto-link new concepts
duplicate_threshold = 0.95               # Min similarity to flag as potential duplicate
auto_link_limit = 5                      # Max auto-links per new concept

[enrichment]
# Enrichment pipeline configuration (optional)

# Semantic deduplication: uses MiniLM embeddings to improve concept merge detection
[enrichment.semantic_dedup]
enabled = true                           # Enable semantic dedup (recommended)
model = "minilm-l6-v2"                  # Model identifier (for caching)
threshold = 0.75                         # Min semantic similarity (0.0-1.0)
use_onnx = false                         # Use ONNX Runtime (future optimization)

# USAGE:
# Enable semantic dedup and run: voidm ontology concept automerge --threshold 0.85 --use-semantic
# This will:
# 1. Find fuzzy matches (fast first pass)
# 2. Compute semantic similarity for fuzzy matches
# 3. Filter by semantic threshold (0.75 default)
# 4. Present merge candidates sorted by semantic similarity
#
# Example similarity scores (with default threshold=0.75):
# - "Docker" vs "Dockerfile": 0.92 ✓ (will merge)
# - "Docker" vs "Containerization": 0.72 ✗ (below 0.75, won't merge)
# - "Docker" vs "Python": 0.23 ✗ (too different)
#
# Tune threshold based on your needs:
# - 0.50-0.65: Liberal (more merges, some false positives)
# - 0.70-0.80: Balanced (recommended default 0.75)
# - 0.85-0.95: Conservative (fewer merges, higher confidence)

# Advanced: NLI enrichment settings
[enrichment.nli]
enabled = false                          # Compute relation suggestions (slow, ~300MB model)
top_k = 5                                # Relation candidates per concept
